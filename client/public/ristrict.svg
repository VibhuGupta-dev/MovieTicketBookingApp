<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0035"/>
      <stop offset="100%" stop-color="#0d001f"/>
    </linearGradient>

    <linearGradient id="rGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf00ff"/>
      <stop offset="50%" stop-color="#8800dd"/>
      <stop offset="100%" stop-color="#5500aa"/>
    </linearGradient>

    <linearGradient id="legGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9900cc"/>
      <stop offset="100%" stop-color="#6600aa"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bf00ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#6600cc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#bf00ff" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Dark circle background -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>

  <!-- Outer glowing ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Inner subtle ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#6600cc" stroke-width="0.8" opacity="0.4"/>

  <!-- Ambient purple glow blob behind R -->
  <ellipse cx="100" cy="95" rx="52" ry="58" fill="#7700cc" opacity="0.08"/>

  <!-- ═══ Bold R Letter ═══ -->
  <!-- Built from precise shapes for crisp render -->

  <!-- Vertical stem of R -->
  <rect x="52" y="38" width="22" height="124" rx="4" fill="url(#rGrad)" filter="url(#softGlow)"/>

  <!-- Top bump / bowl of R -->
  <!-- Outer arch -->
  <path
    d="M 74 38
       L 74 38
       Q 138 38 138 76
       Q 138 108 74 112
       L 74 92
       Q 112 90 112 76
       Q 112 58 74 58
       Z"
    fill="url(#rGrad)"
    filter="url(#softGlow)"
  />

  <!-- Diagonal leg of R — kicks bottom right -->
  <path
    d="M 74 100
       L 96 100
       L 148 162
       L 124 162
       Z"
    fill="url(#legGrad)"
    filter="url(#softGlow)"
  />

  <!-- Highlight streak on stem -->
  <rect x="52" y="38" width="7" height="124" rx="3" fill="white" opacity="0.07"/>

  <!-- Highlight on bowl top -->
  <path
    d="M 74 38 Q 115 40 130 55 Q 115 44 74 44 Z"
    fill="white" opacity="0.09"
  />

  <!-- Bottom reflection dot -->
  <ellipse cx="100" cy="174" rx="28" ry="5" fill="#8800dd" opacity="0.35"/>

</svg>